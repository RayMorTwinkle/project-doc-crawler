# ================================
# 通用文档爬虫 - 站点配置文件
# ================================
# 使用说明：
# 1. 在 sites 部分添加要爬取的站点
# 2. 每个站点需要配置以下字段：
#    - name: 站点显示名称
#    - base_url: 站点根URL
#    - doc_url: 文档入口URL（默认使用 base_url）
#    - selectors: 内容选择器
#    - output_dir: 输出目录
# 3. 可选配置：
#    - sidebar_selector: 侧边栏选择器
#    - url_pattern: URL匹配正则表达式
#    - prefix_to_remove: 文件名中需要移除的URL前缀

# ================================
# 站点配置示例
# ================================
sites:

  # OpenCode 文档（Astro/Starlight 框架）
  opencode:
    name: "OpenCode 中文文档"
    base_url: "https://opencode.ai"
    doc_url: "https://opencode.ai/docs/zh-cn/"
    selectors:
      content: ".sl-markdown-content"
      title: "h1"
    sidebar_selector: "#starlight__sidebar"
    url_pattern: "/docs/zh-cn"
    prefix_to_remove: "/docs/zh-cn"
    output_dir: "data/opencode"

  # Vue.js 文档（VitePress 框架）
  # vue:
